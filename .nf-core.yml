repository_type: pipeline

nf_core_version: 3.5.2

lint:
  files_unchanged:
    - .prettierignore
    - .prettierignore
    - CODE_OF_CONDUCT.md
    - assets/nf-core-group1_logo_light.png
    - docs/images/nf-core-group1_logo_light.png
    - docs/images/nf-core-group1_logo_dark.png
    - .github/ISSUE_TEMPLATE/bug_report.yml
    - .github/CONTRIBUTING.md
    - .github/PULL_REQUEST_TEMPLATE.md
    - assets/email_template.txt
    - docs/README.md
    - .prettierignore
    - .github/CONTRIBUTING.md
    - assets/sendmail_template.txt
    - .prettierignore
  nextflow_config:
    - manifest.name
    - manifest.homePage
  multiqc_config: false
  files_exist:
    - CODE_OF_CONDUCT.md
    - assets/nf-core-group1_logo_light.png
    - docs/images/nf-core-group1_logo_light.png
    - docs/images/nf-core-group1_logo_dark.png
    - .github/ISSUE_TEMPLATE/config.yml
    - .github/workflows/awstest.yml
    - .github/workflows/awsfulltest.yml
    - conf/igenomes.config
    - conf/igenomes_ignored.config
    - assets/multiqc_config.yml
    - assets/email_template.html
    - assets/sendmail_template.txt
    - assets/email_template.txt

template:
  org: APHL-Infectious-Disease
  name: Group1
  description: Re-screen public wastewater metagenomes for enteric viruses
  author: Group 1
  version: 1.0.0dev
  force: true
  outdir: Group1_nfcore_scaffold
  skip_features:
    - igenomes
    - multiqc
    - fastqc
    - seqera_platform
    - gpu
    - vscode
    - rocrate
    - email
    - adaptivecard
    - slackreport
  is_nfcore: false
